services:
  db:
    image: postgres
    # restart: always - it seems this will reset data every time.
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb

    # ENVs
    environment:
      POSTGRES_PASSWORD: example
    ports:
      - 5432:5432
    # Persist the data directory across container removal, and auto-seed a
    # fresh volume from the committed Snapshot. The initdb.d script runs only
    # when the data dir is empty (first creation / after `down -v`), so a
    # refreshed snapshot.sql is applied to an existing volume via
    # `python -m doc_import.db_restore`, not on a plain restart.
    # snapshot.sql must already exist on disk before `up` — Docker turns a
    # missing bind-mount source into a directory. See
    # docs/adr/0004-database-snapshot-and-seed.md.
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/data/snapshot.sql:/docker-entrypoint-initdb.d/snapshot.sql:ro

  adminer:
    image: adminer
    restart: always
    ports:
      - 8085:8080

volumes:
  pgdata: